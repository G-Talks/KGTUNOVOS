<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        /* --- MUHTEŞEM ARAYÜZ & RENK PALETİ --- */
        :root {
            --bg-color: #030712; 
            --surface-color: rgba(17, 24, 39, 0.95); 
            --primary: #10B981; /* Neon Yeşil */
            --secondary: #F97316; /* KGTÜ Turuncu */
            --coffee: #D97706; /* Neo Coffee Rengi */
            --kitchen: #EAB308; /* Neo Mutfak Rengi */
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- HEADER --- */
        header {
            padding: 15px 25px; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between;
            align-items: center; z-index: 100; box-shadow: 0 4px 30px rgba(0,0,0,0.8);
        }
        .brand h1 { font-size: 20px; font-weight: 800; letter-spacing: 1.5px; margin:0;}
        .brand h1 span { color: var(--primary); }
        .status { font-size: 11px; font-weight: bold; color: var(--secondary); background: rgba(249,115,22,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(249,115,22,0.3);}

        /* --- HARİTA ALANI --- */
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle at 50% 50%, #111827, #030712); display: flex; justify-content: center; align-items: center;}
        
        #map-layer { position: absolute; width: 1000px; height: 800px; transform: scale(0.9); /* Sığması için ufak küçültme */ }
        
        .blueprint { position: absolute; width: 100%; height: 100%; opacity: 0.5; pointer-events: none; }
        .routes-svg { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
        
        /* NOKTALAR (NODES) */
        .node { position: absolute; width: 16px; height: 16px; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; border: 2px solid var(--bg-color); z-index: 10; transition: 0.2s;}
        .node:hover { transform: translate(-50%, -50%) scale(1.5); box-shadow: 0 0 15px var(--primary); z-index: 20;}
        
        .node.elevator { background: #E2E8F0; border-radius: 8px; width: 22px; height: 22px; border: 3px solid #3B82F6; box-shadow: 0 0 10px rgba(59,130,246,0.5);} /* Beyaz Yuvarlaklar */
        .node.entrance { background: #EF4444; width: 20px; height: 20px; }
        .node.classroom { background: var(--primary); }
        .node.academic { background: #A855F7; }
        .node.special { background: var(--secondary); width: 24px; height: 24px; border: 3px solid #000; box-shadow: 0 0 15px var(--secondary);}
        .node.coffee { background: var(--coffee); width: 24px; height: 24px; border: 3px solid #000; box-shadow: 0 0 15px var(--coffee);}
        .node.kitchen { background: var(--kitchen); width: 24px; height: 24px; border: 3px solid #000; box-shadow: 0 0 15px var(--kitchen);}
        
        .node-label {
            position: absolute; background: rgba(3, 7, 18, 0.95); padding: 6px 12px; border-radius: 8px;
            border: 1px solid var(--border-light); color: var(--text-main); font-size: 12px; font-weight: 600;
            transform: translate(-50%, 18px); pointer-events: none; white-space: nowrap; z-index: 15;
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }

        #avatar {
            position: absolute; width: 34px; height: 34px; background: #FFF; border-radius: 50%;
            transform: translate(-50%, -50%); display: none; z-index: 50; text-align: center;
            line-height: 34px; font-size: 18px; box-shadow: 0 0 20px #FFF; transition: left 0.6s linear, top 0.6s linear;
        }

        /* --- ALT KONTROL PANELİ --- */
        .dashboard { background: var(--surface-color); padding: 20px 25px; z-index: 100; display: flex; flex-direction: column; gap: 15px; border-top: 1px solid var(--border-light); box-shadow: 0 -10px 40px rgba(0,0,0,0.8);}
        
        .floor-tabs { display: flex; background: rgba(0,0,0,0.8); border-radius: 12px; padding: 6px; gap: 6px; border: 1px solid var(--border-light);}
        .floor-tabs button { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-muted); font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s;}
        .floor-tabs button.active { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(16,185,129,0.3);}

        .routing-box { display: flex; gap: 12px; }
        select { flex: 1; padding: 14px; border-radius: 10px; background: #1F2937; border: 1px solid var(--border-light); color: white; outline: none; font-size: 14px; font-weight: 500;}
        select:focus { border-color: var(--primary); }
        .btn { padding: 14px 25px; border-radius: 10px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: #059669; }
        .btn-secondary { background: var(--secondary); color: #000; display: none; }
        
        #instructions { max-height: 80px; overflow-y: auto; font-size: 13px; color: var(--text-muted); line-height: 1.6; padding: 0 10px; border-left: 3px solid var(--primary);}
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }
    </style>
</head>

class NavEngine {
    constructor(d) { this.n=d.nodes; this.g=d.graph; this.f=0; this.p=[]; this.s=false; }
    findPath(s, e) {
        let dist={}, prev={}, unv=new Set(Object.keys(this.g));
        for(let n in this.g) dist[n]=Infinity; dist[s]=0;
        while(unv.size>0){
            let u=null; for(let n of unv) if(u===null || dist[n]<dist[u]) u=n;
            if(u===e || dist[u]===Infinity) break; unv.delete(u);
            for(let v in this.g[u]) { let alt=dist[u]+this.g[u][v]; if(alt<dist[v]){dist[v]=alt; prev[v]=u;} }
        }
        let p=[], cur=e; while(cur){p.unshift(cur); cur=prev[cur];} return p[0]===s?p:[];
    }
}

class UIController {
    constructor(e) { this.e=e; this.init(); }
    init() {
        let g={0:"",1:"",2:"",3:""};

        document.getElementById('select-start').innerHTML=h; document.getElementById('select-end').innerHTML=h;
        document.querySelectorAll('.floor-tabs button').forEach(b=>b.onclick=(ev)=>this.cf(parseInt(ev.target.dataset.floor)));
        document.getElementById('btn-calc').onclick=()=>this.calc(); document.getElementById('btn-sim').onclick=()=>this.sim();
        this.cf(0);
    }
    cf(f) {
        if(this.e.s) return; this.e.f=f;
        document.querySelectorAll('.floor-tabs button').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.floor-tabs button[data-floor="${f}"]`).classList.add('active');
        const c=document.getElementById('nodes-layer'); c.innerHTML='';
        for(let[id,n] of Object.entries(this.e.n)){
            if(n.f===f){
                c.innerHTML+=`<div class="node ${n.type||''}" style="left:${n.x}px; top:${n.y}px;" onclick="document.getElementById('select-end').value='${id}'"></div><div class="node-label" style="left:${n.x}px; top:${n.y}px;">${n.name}</div>`;
            }
        }
        this.rp();
    }
    rp() {
        const svg=document.getElementById('routes-layer'); svg.innerHTML='';
        for(let i=0; i<this.e.p.length-1; i++){
            let n1=this.e.n[this.e.p[i]], n2=this.e.n[this.e.p[i+1]];
            if(n1.f===this.e.f && n2.f===this.e.f) {
                svg.innerHTML+=`<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" stroke="var(--primary)" stroke-width="6" stroke-linecap="round" stroke-dasharray="15"><animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite"/></line>`;
            }
        }
    }
    calc() {
        const s=document.getElementById('select-start').value, e=document.getElementById('select-end').value;
        if(!s||!e) return; this.e.p=this.e.findPath(s,e); this.cf(this.e.n[s].f);
        let h=""; for(let i=0; i<this.e.p.length-1; i++){
            let n1=this.e.n[this.e.p[i]], n2=this.e.n[this.e.p[i+1]];
            if(n1.f!==n2.f) h+=`<p style="color:var(--secondary); font-weight:bold;">🏢 Asansör ile ${n2.f}. kata geçin.</p>`; else h+=`<p>• <b>${n2.name}</b> yönüne gidin.</p>`;
        }
        document.getElementById('instructions').innerHTML=h; document.getElementById('btn-sim').style.display='block';
    }
    async sim() {
        if(this.e.s || this.e.p.length===0) return; this.e.s=true;
        const av=document.getElementById('avatar'); av.style.display='block';
        for(let i=0; i<this.e.p.length; i++){
            let n=this.e.n[this.e.p[i]];
            if(n.f!==this.e.f) { av.innerHTML="↕️"; await new Promise(r=>setTimeout(r,1000)); this.cf(n.f); av.innerHTML="🚶"; }
            av.style.left=`${n.x}px`; av.style.top=`${n.y}px`; await new Promise(r=>setTimeout(r,800));
        }
        av.innerHTML="📍"; setTimeout(()=>{av.style.display='none'; this.e.s=false;},1500);
    }
}
window.onload = () => new UIController(new NavEngine(DB));
</script>
