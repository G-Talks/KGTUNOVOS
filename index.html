<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGTÜ Merkez Bina Navigasyonu</title>
    <style>
        /* Premium Koyu Tema ve Glassmorphism Temeli */
        :root {
            --gold: #D4AF37;
            --gold-light: #F3E5AB;
            --dark-bg: #121212;
            --glass-bg: rgba(20, 25, 30, 0.85);
            --glass-border: rgba(212, 175, 55, 0.4);
            --text-main: #E0E0E0;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 20px; 
            background: linear-gradient(135deg, #141e30, #243b55); 
            color: var(--text-main);
            min-height: 100vh;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.6); 
        }

        h1 { 
            text-align: center; 
            color: var(--gold); 
            font-weight: 400;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .controls { 
            display: flex; 
            gap: 15px; 
            margin-bottom: 25px; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
        }

        select { 
            padding: 12px 20px; 
            border-radius: 10px; 
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid var(--glass-border); 
            color: white;
            font-size: 15px; 
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        button { 
            padding: 12px 30px; 
            border-radius: 10px; 
            background: linear-gradient(45deg, #B8860B, #D4AF37); 
            color: #121212; 
            border: none; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 15px;
            letter-spacing: 1px;
            transition: 0.3s; 
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }
        
        /* Harita Alanı */
        #map-container { 
            position: relative; 
            width: 100%; 
            height: 600px; 
            background-color: rgba(0,0,0,0.8); 
            border: 1px solid var(--glass-border); 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 25px; 
        }
        
        #map-bg { 
            width: 100%; 
            height: 100%; 
            position: absolute; 
            top: 0; 
            left: 0; 
            background: url('https://via.placeholder.com/1000x600/1a1a1a/D4AF37?text=MERKEZ+B%C4%B0NA+|+Sol:+Alt+Kat+|+Orta:+Zemin+|+Sa%C4%9F:+1.+Kat') no-repeat center center; 
            background-size: cover; 
            opacity: 0.5; 
        }
        
        #routes { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        
        .node { 
            position: absolute; 
            width: 14px; 
            height: 14px; 
            background-color: var(--gold); 
            border-radius: 50%; 
            transform: translate(-50%, -50%); 
            cursor: pointer; 
            border: 2px solid #121212; 
            box-shadow: 0 0 10px var(--gold); 
            transition: all 0.3s ease;
        }

        .node:hover {
            transform: translate(-50%, -50%) scale(1.6);
        }

        .node-label { 
            position: absolute; 
            font-size: 11px; 
            font-weight: bold; 
            color: #121212;
            background: var(--gold-light); 
            padding: 3px 8px; 
            border-radius: 4px; 
            transform: translate(-50%, 15px); 
            pointer-events: none; 
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }
        
        #directions { 
            padding: 20px; 
            background: rgba(0, 0, 0, 0.4); 
            border-left: 4px solid var(--gold); 
            border-radius: 0 10px 10px 0; 
            font-size: 15px; 
            line-height: 1.6; 
            color: var(--text-main);
        }

        ol { margin: 0; padding-left: 20px; }
        li { margin-bottom: 8px; }
        b { color: var(--gold); }
    </style>
</head>
<body>

<div class="container">
    <h1>KGTÜ Merkez Bina</h1>
    
    <div class="controls">
        <select id="start"></select>
        <select id="end"></select>
        <button onclick="calculateRoute()">ROTAYI ÇİZ</button>
    </div>

    <div id="map-container">
        <div id="map-bg"></div>
        <svg id="routes"></svg>
        <div id="nodes-container"></div>
    </div>

    <div id="directions">Navigasyonu başlatmak için başlangıç ve hedef noktalarını seçin.</div>
</div>

<script>
    // 1. KGTÜ MERKEZ BİNA BİREBİR LOKASYONLARI (Sanal Tur Verisi)
    const locations = {
        // --- DIŞ MEKAN VE ZEMİN KAT (Orta Bölge) ---
        "MB_YuruyusYolu": { x: 500, y: 530, name: "Yürüyüş Yolu" },
        "MB_Kamelyalar": { x: 650, y: 530, name: "Kamelyalar" },
        "MB_AnaGiris": { x: 500, y: 430, name: "Merkez Bina Ana Giriş" },
        "MB_Fuaye": { x: 500, y: 320, name: "Fuaye Alanı" },
        "MB_Asansor": { x: 500, y: 200, name: "Asansör / Merdiven" }, // Katları bağlayan düğüm

        // --- ALT KAT (Sol Bölge) ---
        "AK_Koridor": { x: 300, y: 200, name: "Alt Kat Koridoru" },
        "AK_KonferansGiris": { x: 300, y: 300, name: "Konferans Salonları Girişi" },
        "AK_Konf1": { x: 150, y: 260, name: "Konferans Salonu 1" },
        "AK_Konf2": { x: 150, y: 340, name: "Konferans Salonu 2" },
        "AK_BuyukKonf": { x: 150, y: 140, name: "Konferans Salonu (Sahne)" },
        "AK_Fitness": { x: 300, y: 100, name: "Fitness Salonu" },

        // --- 1. KAT (Sağ Bölge) ---
        "K1_Merkez": { x: 700, y: 200, name: "Merkez Bina 1. Kat" },
        "K1_Kafe": { x: 700, y: 100, name: "1. Kat - Kafe Girişi" },
        "K1_Koridor": { x: 850, y: 200, name: "Laboratuvar Koridoru" },
        "K1_MBGLab1": { x: 850, y: 300, name: "Moleküler Biyoloji Lab 1" },
        "K1_MBGLab2": { x: 850, y: 380, name: "Moleküler Biyoloji Lab 2" },
        "K1_MBGLab3": { x: 850, y: 460, name: "Moleküler Biyoloji Lab 3" }
    };

    // 2. BİNA İÇİ BAĞLANTILAR VE YÜRÜYÜŞ MESAFELERİ
    const graph = {
        // Zemin Kat & Dışarısı
        "MB_YuruyusYolu": { "MB_AnaGiris": 20, "MB_Kamelyalar": 15 },
        "MB_Kamelyalar": { "MB_YuruyusYolu": 15 },
        "MB_AnaGiris": { "MB_YuruyusYolu": 20, "MB_Fuaye": 10 },
        "MB_Fuaye": { "MB_AnaGiris": 10, "MB_Asansor": 15 },
        "MB_Asansor": { "MB_Fuaye": 15, "AK_Koridor": 10, "K1_Merkez": 10 }, // Asansör ile Alt Kata veya 1. Kata geçiş

        // Alt Kat
        "AK_Koridor": { "MB_Asansor": 10, "AK_KonferansGiris": 10, "AK_BuyukKonf": 15, "AK_Fitness": 15 },
        "AK_KonferansGiris": { "AK_Koridor": 10, "AK_Konf1": 15, "AK_Konf2": 15 },
        "AK_Konf1": { "AK_KonferansGiris": 15 },
        "AK_Konf2": { "AK_KonferansGiris": 15 },
        "AK_BuyukKonf": { "AK_Koridor": 15 },
        "AK_Fitness": { "AK_Koridor": 15 },

        // 1. Kat
        "K1_Merkez": { "MB_Asansor": 10, "K1_Kafe": 15, "K1_Koridor": 15 },
        "K1_Kafe": { "K1_Merkez": 15 },
        "K1_Koridor": { "K1_Merkez": 15, "K1_MBGLab1": 15, "K1_MBGLab2": 25, "K1_MBGLab3": 35 },
        "K1_MBGLab1": { "K1_Koridor": 15 },
        "K1_MBGLab2": { "K1_Koridor": 25 },
        "K1_MBGLab3": { "K1_Koridor": 35 }
    };

    window.onload = function() {
        const startSelect = document.getElementById('start');
        const endSelect = document.getElementById('end');
        const nodesContainer = document.getElementById('nodes-container');

        startSelect.innerHTML = `<option value="" disabled selected>Şu An Neredesin?</option>`;
        endSelect.innerHTML = `<option value="" disabled selected>Nereye Gitmek İstiyorsun?</option>`;

        for (const [id, data] of Object.entries(locations)) {
            startSelect.innerHTML += `<option value="${id}">${data.name}</option>`;
            endSelect.innerHTML += `<option value="${id}">${data.name}</option>`;

            nodesContainer.innerHTML += `
                <div class="node" style="left: ${data.x}px; top: ${data.y}px;" title="${data.name}"></div>
                <div class="node-label" style="left: ${data.x}px; top: ${data.y}px;">${data.name}</div>
            `;
        }
    };

    function dijkstra(graph, startNode, endNode) {
        let distances = {};
        let prev = {};
        let unvisited = new Set();

        for (let node in graph) {
            distances[node] = Infinity;
            prev[node] = null;
            unvisited.add(node);
        }
        distances[startNode] = 0;

        while (unvisited.size > 0) {
            let currNode = null;
            for (let node of unvisited) {
                if (currNode === null || distances[node] < distances[currNode]) {
                    currNode = node;
                }
            }

            if (currNode === endNode) break;
            unvisited.delete(currNode);

            for (let neighbor in graph[currNode]) {
                let alt = distances[currNode] + graph[currNode][neighbor];
                if (alt < distances[neighbor]) {
                    distances[neighbor] = alt;
                    prev[neighbor] = currNode;
                }
            }
        }

        let path = [];
        let u = endNode;
        while (u) {
            path.unshift(u);
            u = prev[u];
        }
        return path[0] === startNode ? path : [];
    }

    function calculateRoute() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;

        if (!start || !end) {
            document.getElementById('directions').innerHTML = "Lütfen önce başlangıç ve bitiş noktalarını seçin.";
            return;
        }

        if (start === end) {
            document.getElementById('directions').innerHTML = "<b>Zaten buradasın!</b> Başka bir hedef seç.";
            document.getElementById('routes').innerHTML = ""; 
            return;
        }

        const path = dijkstra(graph, start, end);
        const svg = document.getElementById('routes');
        svg.innerHTML = ""; 
        
        let directionsHTML = `<b>${locations[start].name}</b> noktasından <b>${locations[end].name}</b> hedefine rota:<br><br><ol>`;
        
        for (let i = 0; i < path.length - 1; i++) {
            const node1 = locations[path[i]];
            const node2 = locations[path[i+1]];
            
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", node1.x);
            line.setAttribute("y1", node1.y);
            line.setAttribute("x2", node2.x);
            line.setAttribute("y2", node2.y);
            line.setAttribute("stroke", "rgba(212, 175, 55, 0.9)"); 
            line.setAttribute("stroke-width", "4");
            line.setAttribute("stroke-dasharray", "8,8"); 
            
            const animate = document.createElementNS("http://www.w3.org/2000/svg", "animate");
            animate.setAttribute("attributeName", "stroke-dashoffset");
            animate.setAttribute("values", "16;0");
            animate.setAttribute("dur", "1s");
            animate.setAttribute("repeatCount", "indefinite");
            line.appendChild(animate);

            svg.appendChild(line);

            // Asansör uyarısı ekleme mantığı
            let actionText = "yönüne ilerleyin.";
            if (node1.name === "Asansör / Merdiven" && path[i-1] && locations[path[i-1]].name.includes("Fuaye")) {
                actionText = "kullanarak kata geçiş yapın.";
            }

            directionsHTML += `<li><b>${node1.name}</b> noktasından <b>${node2.name}</b> ${actionText}</li>`;
        }
        
        directionsHTML += `<li><b>Hedefe ulaştınız!</b></li></ol>`;
        document.getElementById('directions').innerHTML = directionsHTML;
    }
</script>

</body>
</html>
