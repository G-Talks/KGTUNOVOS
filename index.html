<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KGTÜ Üçgen Bina | PRO Navigasyon</title>
    <style>
        /* --- PRO TEMA & DEĞİŞKENLER --- */
        :root {
            --bg-color: #030712; 
            --panel-bg: rgba(17, 24, 39, 0.9); 
            --kgtu-green: #10B981; 
            --kgtu-orange: #F97316; 
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); 
            color: var(--text-main); height: 100vh; overflow: hidden; 
            display: flex; flex-direction: column;
        }

        /* --- ÜST BİLGİ (HEADER) --- */
        .header {
            padding: 15px 20px; background: rgba(3, 7, 18, 0.85); 
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-light);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; box-shadow: 0 4px 30px rgba(0,0,0,0.6);
        }
        .header h1 { margin: 0; font-size: 20px; font-weight: 600; letter-spacing: 1px; color: var(--text-main);}
        .header h1 b { color: var(--kgtu-green); }
        .live-status { font-size: 12px; display: flex; align-items: center; gap: 6px; color: var(--kgtu-orange); font-weight: bold;}
        .dot { width: 8px; height: 8px; background: var(--kgtu-orange); border-radius: 50%; box-shadow: 0 0 10px var(--kgtu-orange); animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.3); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }

        /* --- HARİTA VE SVG ALANI --- */
        #map-area { 
            flex: 1; position: relative; overflow: hidden; 
            background: radial-gradient(circle at 50% 45%, #111827, #030712); 
        }
        
        /* Birebir ÜÇGEN Mimarisi Çizimi (SVG) */
        .building-outline {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1000px; height: 700px; pointer-events: none; opacity: 0.3;
        }

        #routes, #simulation-layer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 700px; pointer-events: none; }
        #nodes-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 1000px; height: 700px; }
        
        /* Noktalar */
        .node { 
            position: absolute; width: 14px; height: 14px; 
            background: var(--text-main); border-radius: 50%; 
            transform: translate(-50%, -50%); cursor: pointer; transition: 0.2s; z-index: 10;
            border: 2px solid var(--bg-color); box-shadow: 0 0 5px rgba(255,255,255,0.2);
        }
        .node:hover { transform: translate(-50%, -50%) scale(1.5); background: var(--kgtu-green); box-shadow: 0 0 15px var(--kgtu-green); z-index: 20;}
        
        /* Özel Nokta Türleri */
        .node.special { background: var(--kgtu-orange); width: 20px; height: 20px; box-shadow: 0 0 15px var(--kgtu-orange); border: 3px solid #000; } /* Merkezler/Kafeler */
        .node.elevator { background: #3B82F6; border-radius: 4px; width: 16px; height: 16px; border: 2px solid #FFF;} /* Asansörler Kare */
        .node.entrance { background: #EF4444; width: 16px; height: 16px; border-radius: 50%;} /* Girişler Kırmızı */
        .node.classroom { background: var(--kgtu-green); width: 12px; height: 12px; } /* Derslikler Yeşil */
        .node.hidden { display: none; } /* Gizli koridor dönemeçleri */

        .node-label { 
            position: absolute; font-size: 11px; background: rgba(17, 24, 39, 0.95); 
            padding: 5px 10px; border-radius: 6px; border: 1px solid var(--kgtu-green);
            transform: translate(-50%, 15px); white-space: nowrap; z-index: 11;
            color: #F3F4F6; font-weight: 600; pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .node:hover + .node-label { background: var(--kgtu-green); color: #000; z-index: 21;}

        /* Simülasyon İkonu */
        #sim-avatar {
            position: absolute; width: 28px; height: 28px; background: #FFF; 
            border-radius: 50%; transform: translate(-50%, -50%); display: none;
            box-shadow: 0 0 20px #FFF, 0 0 40px var(--kgtu-green); z-index: 50; 
            text-align: center; line-height: 28px; font-size: 16px;
        }

        /* --- ALT KONTROL PANELİ --- */
        .bottom-panel {
            background: var(--panel-bg); backdrop-filter: blur(20px);
            border-top: 1px solid var(--border-light); padding: 25px 20px;
            z-index: 100; box-shadow: 0 -10px 40px rgba(0,0,0,0.7);
        }

        .floor-tabs { display: flex; background: rgba(0,0,0,0.6); border-radius: 12px; padding: 6px; margin-bottom: 20px; border: 1px solid var(--border-light);}
        .floor-tabs button {
            flex: 1; padding: 12px; background: transparent; border: none; 
            color: var(--text-muted); font-weight: 600; font-size: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer;
        }
        .floor-tabs button.active { background: var(--kgtu-green); color: #030712; box-shadow: 0 4px 10px rgba(16, 185, 129, 0.3);}

        .input-group { display: flex; gap: 12px; margin-bottom: 15px; }
        select {
            flex: 1; padding: 14px; border-radius: 10px; font-size: 14px; font-weight: 500;
            background: #1F2937; border: 1px solid rgba(255,255,255,0.1); color: white; outline: none;
            appearance: none; 
        }
        select:focus { border-color: var(--kgtu-green); }
        
        .action-btns { display: flex; gap: 12px; margin-top: 10px;}
        .btn { flex: 1; padding: 15px; border-radius: 10px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s;}
        .btn-route { background: var(--kgtu-green); color: #030712; }
        .btn-route:hover { background: #059669; }
        .btn-sim { background: var(--kgtu-orange); color: #030712; display: none; }

        #directions-text { 
            margin-top: 20px; font-size: 14px; color: var(--text-muted); 
            line-height: 1.6; max-height: 120px; overflow-y: auto; 
            padding-right: 10px; border-left: 3px solid var(--kgtu-green); padding-left: 15px;
        }
        #directions-text b { color: var(--text-main); }
        
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KGTÜ <b>ÜÇGEN BİNA</b></h1>
        <div class="live-status"><div class="dot"></div> GPS AKTİF</div>
    </div>

    <div id="map-area">
        <svg class="building-outline" viewBox="0 0 1000 700">
            <polygon points="500,40 150,560 850,560" fill="rgba(16, 185, 129, 0.03)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="4"/>
            <polygon points="500,280 380,450 620,450" fill="rgba(3, 7, 18, 1)" stroke="rgba(255, 255, 255, 0.1)" stroke-width="2"/>
            
            <polyline points="500,140 250,500 750,500 500,140" fill="none" stroke="rgba(255, 255, 255, 0.04)" stroke-width="40" stroke-linejoin="round"/>
            <line x1="500" y1="360" x2="335" y2="380" stroke="rgba(255, 255, 255, 0.04)" stroke-width="30"/>
            <line x1="500" y1="360" x2="665" y2="380" stroke="rgba(255, 255, 255, 0.04)" stroke-width="30"/>
            <line x1="500" y1="360" x2="500" y2="500" stroke="rgba(255, 255, 255, 0.04)" stroke-width="30"/>
        </svg>

        <svg id="routes"></svg>
        <div id="nodes-container"></div>
        <div id="sim-avatar">🚶‍♂️</div>
    </div>

    <div class="bottom-panel">
        <div class="floor-tabs">
            <button class="active" onclick="changeFloor(0)" id="btn-f0">Zemin Kat</button>
            <button onclick="changeFloor(1)" id="btn-f1">1. Kat</button>
            <button onclick="changeFloor(2)" id="btn-f2">2. Kat</button>
        </div>

        <div class="input-group">
            <select id="start"></select>
        </div>
        <div class="input-group">
            <select id="end"></select>
        </div>

        <div class="action-btns">
            <button class="btn btn-route" onclick="calculateRoute()">Rotayı Çiz</button>
            <button class="btn btn-sim" id="sim-btn" onclick="startSimulation()">▶ Yürüt</button>
        </div>

        <div id="directions-text">Merkezde asansör yoktur, üst katlara çıkmak için köşelerdeki (giriş yanındaki) asansörlere gitmelisiniz.</div>
    </div>

<script>
    // --- BİREBİR ÜÇGEN KOORDİNATLARI ---
    // Üst Köşe: (500, 140)
    // Sol Alt Köşe: (250, 500)
    // Sağ Alt Köşe: (750, 500)
    // Merkez: (500, 360)
    
    const locations = {
        // === ZEMİN KAT (f: 0) ===
        // Girişler (Uç Noktalar)
        "Z_GirisA": { x: 500, y: 80, f: 0, name: "Kuzey Ana Giriş (A)", type: "entrance" },
        "Z_GirisB": { x: 190, y: 500, f: 0, name: "Güneybatı Girişi (B)", type: "entrance" },
        "Z_GirisC": { x: 810, y: 500, f: 0, name: "Güneydoğu Girişi (C)", type: "entrance" },
        
        // Asansörler (Girişlerin hemen 5 metre yanında, köşelerde)
        "Z_AsansorA": { x: 500, y: 140, f: 0, name: "A Blok Asansörü (Kuzey)", type: "elevator" },
        "Z_AsansorB": { x: 250, y: 500, f: 0, name: "B Blok Asansörü (Sol Alt)", type: "elevator" },
        "Z_AsansorC": { x: 750, y: 500, f: 0, name: "C Blok Asansörü (Sağ Alt)", type: "elevator" },
        
        // Zemin Kat Derslikler ve Alanlar (Kenarlar Üzerinde)
        "Z_Amfi1": { x: 417, y: 260, f: 0, name: "Büyük Amfi 1", type: "classroom" },
        "Z_Amfi2": { x: 583, y: 260, f: 0, name: "Büyük Amfi 2", type: "classroom" },
        "Z_OgrenciIsleri": { x: 416, y: 500, f: 0, name: "Öğrenci İşleri" },
        "Z_Kutuphane": { x: 583, y: 500, f: 0, name: "Merkez Kütüphane" },
        
        // Zemin Kat Merkez Alan
        "Z_Fuaye": { x: 500, y: 360, f: 0, name: "Ana Fuaye (Merkez)", type: "special" },

        // Gizli Kavşaklar (Yolların düzgün çizilmesi için)
        "Z_KavsakL2": { x: 335, y: 380, f: 0, name: "Sol Koridor Ayrımı", type: "hidden", hideInMenu: true },
        "Z_KavsakR2": { x: 665, y: 380, f: 0, name: "Sağ Koridor Ayrımı", type: "hidden", hideInMenu: true },
        "Z_KavsakB": { x: 500, y: 500, f: 0, name: "Alt Koridor Ayrımı", type: "hidden", hideInMenu: true },


        // === 1. KAT (f: 1) - DERSLİKLER VE NEO CAFE ===
        // Asansörler aynı konumlarda
        "K1_AsansorA": { x: 500, y: 140, f: 1, name: "A Blok Asansörü", type: "elevator" },
        "K1_AsansorB": { x: 250, y: 500, f: 1, name: "B Blok Asansörü", type: "elevator" },
        "K1_AsansorC": { x: 750, y: 500, f: 1, name: "C Blok Asansörü", type: "elevator" },

        // Merkez Kafe (Ortada asansör yok)
        "K1_NeoCafe": { x: 500, y: 360, f: 1, name: "Neo Cafe (Merkez Alan)", type: "special" },

        // 1. Kat Derslikleri (Kenarlarda)
        "K1_MBG1": { x: 417, y: 260, f: 1, name: "MBG Laboratuvarı 1", type: "classroom" },
        "K1_MBG2": { x: 335, y: 380, f: 1, name: "MBG Laboratuvarı 2", type: "classroom" }, // Sol Kavşak Noktasında
        "K1_D101": { x: 583, y: 260, f: 1, name: "Derslik 101", type: "classroom" },
        "K1_D102": { x: 665, y: 380, f: 1, name: "Derslik 102", type: "classroom" }, // Sağ Kavşak Noktasında
        "K1_D103": { x: 416, y: 500, f: 1, name: "Derslik 103", type: "classroom" },
        "K1_D104": { x: 500, y: 500, f: 1, name: "Derslik 104", type: "classroom" }, // Alt Kavşak Noktasında
        "K1_D105": { x: 583, y: 500, f: 1, name: "Derslik 105", type: "classroom" },


        // === 2. KAT (f: 2) - DERSLİKLER VE NEO MUTFAK ===
        "K2_AsansorA": { x: 500, y: 140, f: 2, name: "A Blok Asansörü", type: "elevator" },
        "K2_AsansorB": { x: 250, y: 500, f: 2, name: "B Blok Asansörü", type: "elevator" },
        "K2_AsansorC": { x: 750, y: 500, f: 2, name: "C Blok Asansörü", type: "elevator" },

        // Merkez Mutfak (Ortada asansör yok)
        "K2_NeoMutfak": { x: 500, y: 360, f: 2, name: "Neo Mutfak (Merkez Alan)", type: "special" },

        // 2. Kat Derslikleri
        "K2_D201": { x: 417, y: 260, f: 2, name: "Derslik 201", type: "classroom" },
        "K2_D202": { x: 335, y: 380, f: 2, name: "Derslik 202", type: "classroom" },
        "K2_D203": { x: 583, y: 260, f: 2, name: "Derslik 203", type: "classroom" },
        "K2_D204": { x: 665, y: 380, f: 2, name: "Derslik 204", type: "classroom" },
        "K2_Mimarlik": { x: 416, y: 500, f: 2, name: "Mimarlık Atölyesi", type: "classroom" },
        "K2_Bilgisayar": { x: 500, y: 500, f: 2, name: "Bilgisayar Laboratuvarı", type: "classroom" },
        "K2_D205": { x: 583, y: 500, f: 2, name: "Derslik 205", type: "classroom" }
    };

    // --- ÜÇGEN BAĞLANTI AĞI (GRAPH) ---
    // Sadece kenarlar (A-B, B-C, C-A) ve kenar ortalarından merkeze yollar var.
    // Ortadan yukarı çıkış KESİNLİKLE YOK! (Kullanıcı köşelere yürümek zorunda)
    const graph = {
        // --- ZEMİN KAT YATAY AĞ ---
        "Z_GirisA": { "Z_AsansorA": 5 },
        "Z_GirisB": { "Z_AsansorB": 5 },
        "Z_GirisC": { "Z_AsansorC": 5 },

        // Sol Kenar (A'dan B'ye)
        "Z_AsansorA": { "Z_GirisA": 5, "Z_Amfi1": 15, "Z_Amfi2": 15, "K1_AsansorA": 30 }, // Kat çıkışı köşeden
        "Z_Amfi1": { "Z_AsansorA": 15, "Z_KavsakL2": 15 },
        "Z_KavsakL2": { "Z_Amfi1": 15, "Z_AsansorB": 15, "Z_Fuaye": 20 },
        "Z_AsansorB": { "Z_GirisB": 5, "Z_KavsakL2": 15, "Z_OgrenciIsleri": 15, "K1_AsansorB": 30 }, // Kat çıkışı köşeden

        // Sağ Kenar (A'dan C'ye)
        "Z_Amfi2": { "Z_AsansorA": 15, "Z_KavsakR2": 15 },
        "Z_KavsakR2": { "Z_Amfi2": 15, "Z_AsansorC": 15, "Z_Fuaye": 20 },
        "Z_AsansorC": { "Z_GirisC": 5, "Z_KavsakR2": 15, "Z_Kutuphane": 15, "K1_AsansorC": 30 }, // Kat çıkışı köşeden

        // Alt Kenar (B'den C'ye)
        "Z_OgrenciIsleri": { "Z_AsansorB": 15, "Z_KavsakB": 10 },
        "Z_KavsakB": { "Z_OgrenciIsleri": 10, "Z_Kutuphane": 10, "Z_Fuaye": 20 },
        "Z_Kutuphane": { "Z_KavsakB": 10, "Z_AsansorC": 15 },

        // Merkez (Sadece Yatay yürüyüş, dikey çıkış YOK)
        "Z_Fuaye": { "Z_KavsakL2": 20, "Z_KavsakR2": 20, "Z_KavsakB": 20 },


        // --- 1. KAT YATAY AĞ ---
        "K1_AsansorA": { "Z_AsansorA": 30, "K1_MBG1": 15, "K1_D101": 15, "K2_AsansorA": 30 },
        "K1_MBG1": { "K1_AsansorA": 15, "K1_MBG2": 15 },
        "K1_MBG2": { "K1_MBG1": 15, "K1_AsansorB": 15, "K1_NeoCafe": 20 },
        "K1_AsansorB": { "Z_AsansorB": 30, "K1_MBG2": 15, "K1_D103": 15, "K2_AsansorB": 30 },

        "K1_D101": { "K1_AsansorA": 15, "K1_D102": 15 },
        "K1_D102": { "K1_D101": 15, "K1_AsansorC": 15, "K1_NeoCafe": 20 },
        "K1_AsansorC": { "Z_AsansorC": 30, "K1_D102": 15, "K1_D105": 15, "K2_AsansorC": 30 },

        "K1_D103": { "K1_AsansorB": 15, "K1_D104": 10 },
        "K1_D104": { "K1_D103": 10, "K1_D105": 10, "K1_NeoCafe": 20 },
        "K1_D105": { "K1_D104": 10, "K1_AsansorC": 15 },

        "K1_NeoCafe": { "K1_MBG2": 20, "K1_D102": 20, "K1_D104": 20 },


        // --- 2. KAT YATAY AĞ ---
        "K2_AsansorA": { "K1_AsansorA": 30, "K2_D201": 15, "K2_D203": 15 },
        "K2_D201": { "K2_AsansorA": 15, "K2_D202": 15 },
        "K2_D202": { "K2_D201": 15, "K2_AsansorB": 15, "K2_NeoMutfak": 20 },
        "K2_AsansorB": { "K1_AsansorB": 30, "K2_D202": 15, "K2_Mimarlik": 15 },

        "K2_D203": { "K2_AsansorA": 15, "K2_D204": 15 },
        "K2_D204": { "K2_D203": 15, "K2_AsansorC": 15, "K2_NeoMutfak": 20 },
        "K2_AsansorC": { "K1_AsansorC": 30, "K2_D204": 15, "K2_D205": 15 },

        "K2_Mimarlik": { "K2_AsansorB": 15, "K2_Bilgisayar": 10 },
        "K2_Bilgisayar": { "K2_Mimarlik": 10, "K2_D205": 10, "K2_NeoMutfak": 20 },
        "K2_D205": { "K2_Bilgisayar": 10, "K2_AsansorC": 15 },

        "K2_NeoMutfak": { "K2_D202": 20, "K2_D204": 20, "K2_Bilgisayar": 20 }
    };

    let currentFloor = 0;
    let currentPath = [];
    let isSimulating = false;

    window.onload = () => { populateSelects(); renderFloor(currentFloor); };

    function populateSelects() {
        const start = document.getElementById('start');
        const end = document.getElementById('end');
        let groups = { 0: "", 1: "", 2: "" };
        
        start.innerHTML = `<option value="" disabled selected>Başlangıç Konumu?</option>`;
        end.innerHTML = `<option value="" disabled selected>Hedef Konum?</option>`;

        for (const [id, data] of Object.entries(locations)) {
            if (!data.hideInMenu) {
                groups[data.f] += `<option value="${id}">${data.name}</option>`;
            }
        }
        
        const formatGroups = `<optgroup label="-- ZEMİN KAT --">${groups[0]}</optgroup>
                              <optgroup label="-- 1. KAT --">${groups[1]}</optgroup>
                              <optgroup label="-- 2. KAT --">${groups[2]}</optgroup>`;
        
        start.innerHTML += formatGroups; end.innerHTML += formatGroups;
    }

    function changeFloor(floorNum) {
        if(isSimulating) return; 
        currentFloor = floorNum;
        document.querySelectorAll('.floor-tabs button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('btn-f' + floorNum).classList.add('active');
        renderFloor(currentFloor);
        if (currentPath.length > 0) drawPathOnSvg(currentPath);
    }

    function renderFloor(floorNum) {
        const container = document.getElementById('nodes-container');
        container.innerHTML = ""; 
        for (const [id, data] of Object.entries(locations)) {
            if (data.f === floorNum) {
                let classes = "node";
                if (data.type) classes += " " + data.type;
                
                if (!data.hideInMenu) {
                    container.innerHTML += `
                        <div class="${classes}" style="left: ${data.x}px; top: ${data.y}px;" onclick="document.getElementById('end').value='${id}'"></div>
                        <div class="node-label" style="left: ${data.x}px; top: ${data.y}px;">${data.name}</div>
                    `;
                }
            }
        }
    }

    function dijkstra(startNode, endNode) {
        let dist = {}, prev = {}, unvisited = new Set(Object.keys(graph));
        for (let n in graph) dist[n] = Infinity;
        dist[startNode] = 0;
        while (unvisited.size > 0) {
            let u = null;
            for (let n of unvisited) if (u === null || dist[n] < dist[u]) u = n;
            if (u === endNode || dist[u] === Infinity) break;
            unvisited.delete(u);
            for (let neighbor in graph[u]) {
                let alt = dist[u] + graph[u][neighbor];
                if (alt < dist[neighbor]) { dist[neighbor] = alt; prev[neighbor] = u; }
            }
        }
        let path = [], curr = endNode;
        while (curr) { path.unshift(curr); curr = prev[curr]; }
        return path[0] === startNode ? path : [];
    }

    function calculateRoute() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        if (!start || !end) { alert("Lütfen listelerden seçim yapın."); return; }
        if (start === end) { alert("Hedefiniz zaten bulunduğunuz konum!"); return; }

        currentPath = dijkstra(start, end);
        changeFloor(locations[start].f); 
        generateTextDirections(currentPath);
        document.getElementById('sim-btn').style.display = 'block'; 
    }

    function drawPathOnSvg(path) {
        const svg = document.getElementById('routes');
        svg.innerHTML = ""; 
        for (let i = 0; i < path.length - 1; i++) {
            let n1 = locations[path[i]], n2 = locations[path[i+1]];
            
            if (n1.f === currentFloor && n2.f === currentFloor) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", n1.x); line.setAttribute("y1", n1.y);
                line.setAttribute("x2", n2.x); line.setAttribute("y2", n2.y);
                line.setAttribute("stroke", "var(--kgtu-green)"); 
                line.setAttribute("stroke-width", "6");
                line.setAttribute("stroke-dasharray", "12,12");
                line.setAttribute("stroke-linecap", "round");

                const anim = document.createElementNS("http://www.w3.org/2000/svg", "animate");
                anim.setAttribute("attributeName", "stroke-dashoffset");
                anim.setAttribute("values", "24;0"); anim.setAttribute("dur", "0.8s");
                anim.setAttribute("repeatCount", "indefinite");
                line.appendChild(anim);
                svg.appendChild(line);
            }
        }
    }

    function generateTextDirections(path) {
        let html = "<b>Adım Adım Yol Tarifi:</b><br><br>";
        for (let i = 0; i < path.length - 1; i++) {
            let n1 = locations[path[i]], n2 = locations[path[i+1]];
            
            if (n1.f !== n2.f) {
                let action = n2.f > n1.f ? "yukarı çıkın ⬆️" : "aşağı inin ⬇️";
                html += `<span style="color:var(--kgtu-orange); display:block; margin:10px 0; font-weight:bold;">🏢 Köşedeki Asansörü kullanarak ${n2.f}. Kata ${action}.</span>`;
            } else {
                if(!n2.hideInMenu) {
                    html += `• Koridordan <b>${n2.name}</b> yönüne ilerleyin.<br>`;
                }
            }
        }
        html += `<br><span style="color:var(--kgtu-green); font-weight:bold; font-size:16px;">📍 Hedefe Ulaştınız!</span>`;
        document.getElementById('directions-text').innerHTML = html;
    }

    function startSimulation() {
        if(currentPath.length === 0 || isSimulating) return;
        isSimulating = true;
        document.getElementById('sim-btn').style.display = 'none';
        
        const avatar = document.getElementById('sim-avatar');
        avatar.style.display = 'block';
        
        let step = 0;

        function walk() {
            if (step >= currentPath.length) {
                isSimulating = false;
                setTimeout(() => { avatar.style.display = 'none'; }, 1500);
                return;
            }

            let currentNode = locations[currentPath[step]];
            
            if(currentNode.f !== currentFloor) {
                isSimulating = false; 
                changeFloor(currentNode.f);
                isSimulating = true;  
            }

            avatar.style.left = currentNode.x + 'px';
            avatar.style.top = currentNode.y + 'px';

            step++;
            setTimeout(walk, 900); 
        }

        let startNode = locations[currentPath[0]];
        changeFloor(startNode.f);
        avatar.style.transition = 'none'; 
        avatar.style.left = startNode.x + 'px';
        avatar.style.top = startNode.y + 'px';
        
        setTimeout(() => {
            avatar.style.transition = 'left 0.7s linear, top 0.7s linear'; 
            walk();
        }, 100);
    }
</script>

</body>
</html>
