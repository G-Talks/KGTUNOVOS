<!DOCTYPE html>

    <style>
        /* --- ARAYÜZ & RENK PALETİ --- */
        :root {
            --bg-color: #030712; 
            --surface-color: rgba(17, 24, 39, 0.95); 
            --primary: #10B981; 
            --secondary: #F97316; 
            --coffee: #D97706; 
            --kitchen: #EAB308; 
            --text-main: #F3F4F6;
            --text-muted: #9CA3AF;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; user-select: none; }
        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- KGTÜ NAV ANİMASYONU --- */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at center, #111827, #030712);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            flex-direction: column; animation: fadeOut 0.8s ease-in-out 2.2s forwards; pointer-events: none;
        }
        #splash-screen h1 { font-size: clamp(2rem, 5vw, 3.5rem); letter-spacing: 5px; color: var(--text-main); animation: popIn 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; text-shadow: 0 0 20px rgba(16, 185, 129, 0.4); text-align: center; }
        #splash-screen span { color: var(--primary); }
        #splash-screen p { color: var(--secondary); margin-top: 15px; font-weight: bold; letter-spacing: 3px; font-size: 14px; opacity: 0; animation: fadeIn 0.5s ease-in-out 0.8s forwards; text-align: center; }

        @keyframes popIn { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        @keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }

        /* --- HEADER --- */
        header { padding: 12px 20px; background: rgba(3, 7, 18, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .brand { display: flex; flex-direction: column; gap: 4px;}
        .brand h1 { font-size: clamp(16px, 4vw, 22px); font-weight: 800; letter-spacing: 1px; margin:0;}
        .brand h1 span { color: var(--primary); }
        .credit { font-size: 11px; color: var(--text-muted); font-weight: 500; letter-spacing: 0.5px;}
        .status { font-size: 11px; font-weight: bold; color: var(--secondary); background: rgba(249,115,22,0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(249,115,22,0.3); display: flex; align-items: center; gap: 5px;}
        .pulse-dot { width: 8px; height: 8px; background: var(--secondary); border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0.7); } 70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(249, 115, 22, 0); } 100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(249, 115, 22, 0); } }

        /* --- SAF SVG HARİTA ALANI (Asla Kaymaz) --- */
        #map-viewport { flex: 1; position: relative; overflow: hidden; background: radial-gradient(circle at 50% 50%, #111827, #030712); display: flex; justify-content: center; align-items: center; padding: 10px; }
        
        #map-svg {
            width: 100%; height: 100%;
            max-width: 1000px; max-height: 80vh;
        }

        /* SIM OVERLAY */
        #sim-overlay { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(16, 185, 129, 0.1); border: 1px solid var(--primary); padding: 8px 16px; border-radius: 20px; color: var(--primary); font-weight: bold; font-size: 13px; box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); backdrop-filter: blur(10px); opacity: 0; visibility: hidden; transition: 0.3s; z-index: 60; display: flex; align-items: center; gap: 8px; }
        #sim-overlay.active { opacity: 1; visibility: visible; }
        #sim-overlay.success { background: rgba(16, 185, 129, 0.2); background-color: var(--primary); color: #000; box-shadow: 0 0 30px var(--primary);}
        .sim-spinner { width: 14px; height: 14px; border: 2px solid var(--primary); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- ALT KONTROL PANELİ --- */
        .dashboard { background: var(--surface-color); padding: 15px 20px; z-index: 100; display: flex; flex-direction: column; gap: 12px; border-top: 1px solid var(--border-light); box-shadow: 0 -10px 40px rgba(0,0,0,0.8); flex-shrink: 0;}
        .floor-tabs { display: flex; background: rgba(0,0,0,0.8); border-radius: 12px; padding: 6px; gap: 6px; border: 1px solid var(--border-light);}
        .floor-tabs button { flex: 1; padding: 10px 5px; background: transparent; border: none; color: var(--text-muted); font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: clamp(11px, 2vw, 13px);}
        .floor-tabs button.active { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(16,185,129,0.3);}

        /* NATIVE SEARCH BARS */
        .routing-box { display: flex; gap: 10px; }
        .search-container { flex: 1; display: flex; flex-direction: column;}
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; background: #1F2937; border: 1px solid var(--border-light); color: white; outline: none; font-size: 13px; font-weight: 500;}
        input[type="text"]:focus { border-color: var(--primary); }
        
        .btn { padding: 12px 18px; border-radius: 8px; border: none; font-weight: bold; font-size: 13px; cursor: pointer; transition: 0.2s; white-space: nowrap;}
        .btn-primary { background: var(--primary); color: #000; }
        .btn-primary:hover { background: #059669; }
        .btn-secondary { background: var(--secondary); color: #000; display: none; }
        
        .meta-info { display: flex; gap: 20px; font-size: 12px; color: var(--text-muted); border-top: 1px dashed var(--border-light); padding-top: 10px;}
        .meta-info span { display: flex; align-items: center; gap: 5px; }
        .meta-info b { color: var(--primary); font-size: 14px;}

        #instructions { max-height: 60px; overflow-y: auto; font-size: 13px; color: var(--text-muted); line-height: 1.5; padding: 0 10px; border-left: 3px solid var(--primary);}
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #4B5563; border-radius: 10px; }

        @media (max-width: 768px) {
            .status { display: none; }

            .floor-tabs button { flex: 1 1 45%; padding: 8px; }
            .dashboard { padding: 15px; }

class NavEngine {
    constructor(d) { this.n=d.nodes; this.g=d.graph; this.f=0; this.p=[]; this.s=false; }
    findPath(s, e) {
        let dist={}, prev={}, unv=new Set(Object.keys(this.g));
        for(let n in this.g) dist[n]=Infinity; dist[s]=0;
        while(unv.size>0){
            let u=null; for(let n of unv) if(u===null || dist[n]<dist[u]) u=n;
            if(u===e || dist[u]===Infinity) break; unv.delete(u);
            for(let v in this.g[u]) { let alt=dist[u]+this.g[u][v]; if(alt<dist[v]){dist[v]=alt; prev[v]=u;} }
        }
        let p=[], cur=e; while(cur){p.unshift(cur); cur=prev[cur];} return p[0]===s?p:[];
    }
    getStats(p) {
        if(p.length < 2) return { d: 0, t: 0 };
        let px = 0, fl = 0;
        for(let i=0; i<p.length-1; i++){
            let n1 = this.n[p[i]], n2 = this.n[p[i+1]];
            if(n1.f !== n2.f) fl++; else px += Math.sqrt(Math.pow(n2.x - n1.x, 2) + Math.pow(n2.y - n1.y, 2));
        }
        let m = Math.round(px * 0.15); 
        return { d: m, t: Math.round(m / 1.4) + (fl * 15) };
    }
}

    init() {
        // Datalist Doldurma
        let listHTML = "";
        for(let [id, n] of Object.entries(this.e.n)) {
            listHTML += `<option value="${n.name}"></option>`;
        }
        document.getElementById('nodes-list').innerHTML = listHTML;

        document.querySelectorAll('.floor-tabs button').forEach(b=>b.onclick=(ev)=>this.cf(parseInt(ev.target.dataset.floor)));
        document.getElementById('btn-calc').onclick=()=>this.calc(); document.getElementById('btn-sim').onclick=()=>this.sim();
        
        this.cf(0);
    }

    cf(f, bypassSimCheck = false) {
        if(this.e.s && !bypassSimCheck) return; 
        this.e.f=f;
        
        document.querySelectorAll('.floor-tabs button').forEach(b=>b.classList.remove('active'));
        document.querySelector(`.floor-tabs button[data-floor="${f}"]`).classList.add('active');
        
        const layer = document.getElementById('nodes-layer'); 
        layer.innerHTML = '';
        
        for(let [id, n] of Object.entries(this.e.n)){
            if(n.f === f){
                // Renk ve Boyut Belirleme
                let fill = "#10B981", r = 8, stroke = "transparent", sw = 0;
                
                if(n.type === 'elevator') { fill = "#E2E8F0"; r = 10; stroke = "#3B82F6"; sw = 3; }
                else if(n.type === 'academic') { fill = "#A855F7"; }
                else if(n.type === 'special') { fill = "#F97316"; r = 12; stroke = "#000"; sw = 2; }
                else if(n.type === 'coffee') { fill = "#D97706"; r = 12; stroke = "#000"; sw = 2; }
                else if(n.type === 'kitchen') { fill = "#EAB308"; r = 12; stroke = "#000"; sw = 2; }

                // Pürüzsüz SVG Çizimi (Text Background Stroke yöntemiyle etiketler)
                layer.innerHTML += `
                    <g style="cursor: pointer;" onclick="document.getElementById('select-end').value='${n.name}'">
                        <circle cx="${n.x}" cy="${n.y}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" />
                        <text x="${n.x}" y="${n.y + 24}" fill="#F3F4F6" font-size="13" font-family="sans-serif" font-weight="bold" text-anchor="middle" stroke="#030712" stroke-width="4" paint-order="stroke" style="pointer-events: none;">${n.name}</text>
                    </g>
                `;
            }
        }
        this.rp();
    }
    
    rp() {
        const svg = document.getElementById('routes-layer'); 
        svg.innerHTML = '';
        for(let i=0; i<this.e.p.length-1; i++){
            let n1 = this.e.n[this.e.p[i]], n2 = this.e.n[this.e.p[i+1]];
            if(n1.f === this.e.f && n2.f === this.e.f) {
                svg.innerHTML += `<line x1="${n1.x}" y1="${n1.y}" x2="${n2.x}" y2="${n2.y}" stroke="#10B981" stroke-width="6" stroke-linecap="round" stroke-dasharray="15"><animate attributeName="stroke-dashoffset" values="30;0" dur="0.8s" repeatCount="indefinite"/></line>`;
            }
        }
    }
    
    calc() {
        const startName = document.getElementById('select-start').value;
        const endName = document.getElementById('select-end').value;
        
        const s = Object.keys(this.e.n).find(key => this.e.n[key].name === startName);
        const e = Object.keys(this.e.n).find(key => this.e.n[key].name === endName);
        
        if(!s || !e) {
            document.getElementById('instructions').innerHTML = '<p style="color:var(--secondary)">Lütfen arama çubuğundan geçerli bir konum seçin veya haritadan tıklayın.</p>';
            return;
        }

        this.e.p = this.e.findPath(s,e); 
        this.cf(this.e.n[s].f);
        
        let h = ""; 
        for(let i=0; i<this.e.p.length-1; i++){
            let n1 = this.e.n[this.e.p[i]], n2 = this.e.n[this.e.p[i+1]];
            if(n1.f !== n2.f) {
                h += `<p class="floor-change">🏢 Asansör ile ${n2.f}. kata geçin.</p>`; 
            } else {
                h += `<p><b>${n2.name}</b> yönüne gidin.</p>`;
            }
        }
        document.getElementById('instructions').innerHTML = h; 
        document.getElementById('btn-sim').style.display = 'block';

        let stats = this.e.getStats(this.e.p);
        document.getElementById('meta-dist').innerText = stats.d + "m";
        document.getElementById('meta-time').innerText = stats.t > 60 ? `${Math.floor(stats.t/60)}dk ${stats.t%60}sn` : `${stats.t}sn`;
    }
    
    async sim() {
        if(this.e.s || this.e.p.length === 0) return; 
        this.e.s = true;
        
        const avG = document.getElementById('avatar-layer');
        const avText = avG.querySelector('text');
        const overlay = document.getElementById('sim-overlay'); 
        const simText = document.getElementById('sim-text');
        
        avG.style.display = 'block';
        overlay.classList.add('active');
        overlay.classList.remove('success');
        
        for(let i=0; i<this.e.p.length; i++){
            let n = this.e.n[this.e.p[i]];
            
            // Eğer kat değişimi varsa
            if(n.f !== this.e.f) { 
                avText.innerHTML = "↕️"; 
                simText.innerText = `${n.f}. Kata Çıkılıyor...`;
                
                await new Promise(r => setTimeout(r, 1200)); 
                this.cf(n.f, true); 
                
                avText.innerHTML = "🚶"; 
                simText.innerText = "KGTÜ NAV Yönlendiriyor...";
                await new Promise(r => setTimeout(r, 300)); 
            }
            
            // Konum güncellemesi (SVG transform)
            avG.style.transform = `translate(${n.x}px, ${n.y}px)`;
            await new Promise(r => setTimeout(r, 800));
        }
        
        avText.innerHTML = "📍"; 
        overlay.classList.add('success');
        overlay.innerHTML = `<span>✅ Hedefe Ulaşıldı</span>`;
        
        setTimeout(()=>{
            avG.style.display = 'none'; 
            overlay.classList.remove('active'); 
            overlay.innerHTML = `<div class="sim-spinner"></div> <span id="sim-text">KGTÜ NAV Yönlendiriyor...</span>`;
            this.e.s = false;
        }, 2500);
    }
}

window.onload = () => new UIController(new NavEngine(DB));
</script>
</body>
</html>
